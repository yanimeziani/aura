# Redirect raw IP to the official domain
http://89.116.170.202 {
    redir https://meziani.org{uri} permanent
}

meziani.org {
    # Automatic SSL via Let's Encrypt
    
    # Serve Frontend
    root * /var/www/html/ai_agency_web
    file_server
    try_files {path} {path}/ /index.html

    # Proxy API to your Home Machine via Tailscale
    handle_path /api/* {
        reverse_proxy 100.108.118.34:8000
    }

    # Proxy n8n to your Home Machine via Tailscale
    handle_path /automation/* {
        reverse_proxy 100.108.118.34:5678 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
        }
    }

    header {
        Access-Control-Allow-Origin *
        Strict-Transport-Security "max-age=31536000;"
    }
}
