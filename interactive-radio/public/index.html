<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>24/7 Deep Dive Live Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    .header { width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.5px; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .live-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; animation: pulse 2s infinite; }
    .player-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 800px; padding: 2rem; box-sizing: border-box; }
    .visualizer { height: 120px; width: 100%; max-width: 400px; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 2rem; }
    .bar { width: 8px; border-radius: 4px; background: rgba(255, 255, 255, 0.2); transition: height 0.1s ease, background 0.3s ease; height: 8px; }
    .bar.active { background: linear-gradient(180deg, #60a5fa, #a78bfa); }
    .playing-status { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 1rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
    .status-dot.live { background: #10b981; box-shadow: 0 0 10px #10b981; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .transcript { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 1.5rem; height: 350px; overflow-y: auto; margin-bottom: 2rem; font-size: 1.05rem; line-height: 1.6; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
    .transcript::-webkit-scrollbar { width: 6px; }
    .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .line { margin-bottom: 1rem; opacity: 0; animation: fadeIn 0.5s forwards; display: flex; flex-direction: column;}
    .line.active { font-weight: 500; color: #fff; }
    .line.dimmed { color: #64748b; }
    @keyframes fadeIn { to { opacity: 1; } }
    .speaker-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 4px; display: inline-flex; align-items: center; gap: 6px;}
    .speaker-David { color: #60a5fa; }
    .speaker-Sarah { color: #f472b6; }
    .speaker-Chloe { color: #34d399; }
    .speaker-Director { color: #fbbf24; } 
    .overlap-tag { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: #cbd5e1; font-weight: 500;}
    .controls-wrapper { width: 100%; display: flex; gap: 1rem; background: rgba(255, 255, 255, 0.02); padding: 1rem; border-radius: 100px; border: 1px solid rgba(255,255,255,0.05); align-items:center; justify-content:center;}
    button { padding: 1rem 2rem; border: none; border-radius: 100px; font-family: inherit; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: all 0.2s ease; display:flex; align-items:center; gap:8px;}
    .btn-primary { background: #e2e8f0; color: #0f172a; }
    .btn-primary:hover:not(:disabled) { background: #fff; transform: scale(1.02); }
    .btn-mike { background: #10b981; color: white; width: 100%; justify-content:center; user-select: none; }
    .btn-mike.recording { background: #ef4444; animation: pulse 1s infinite; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="live-badge">24/7 LIVE</div>
      <div class="logo">Deep Dive: Local Studio</div>
    </div>
    <div style="font-size: 0.8rem; color: #64748b;">Powered by Qwen, Whisper, EdgeTTS</div>
  </header>
  <div class="player-container">
    <div class="playing-status">
      <div id="statusDot" class="status-dot"></div>
      <span id="statusText">Studio Offline</span>
    </div>
    <div class="visualizer" id="visualizer"></div>
    <div class="transcript" id="transcript">
      <div style="text-align:center; color:#475569; margin-top: 40px;">
        Click "Turn On Radio" to establish 24/7 continuous radio stream...
      </div>
    </div>
    <div class="controls-wrapper">
      <button id="startBtn" class="btn-primary">📻 Turn On Radio</button>
      <button id="micBtn" class="btn-mike" style="display:none;">🎤 Hold to Speak</button>
    </div>
  </div>

  <script>
    const transcriptDiv = document.getElementById('transcript');
    const startBtn = document.getElementById('startBtn');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const visualizer = document.getElementById('visualizer');

    const bars = [];
    for(let i=0; i<30; i++) {
        const b = document.createElement('div');
        b.className = 'bar';
        visualizer.appendChild(b);
        bars.push(b);
    }

    let ws;
    let audioQueue = [];
    let audioContext;
    let nextStartTime = 0;
    let visualizerInterval;
    let isGenerating = false;
    let mediaRecorder;
    let audioChunks = [];

    function startVisualizer() {
      if(visualizerInterval) return;
      bars.forEach(b => b.classList.add('active'));
      visualizerInterval = setInterval(() => {
        bars.forEach(b => { b.style.height = (Math.random() * 80 + 10) + 'px'; });
      }, 100);
      statusDot.classList.add('live');
      statusText.innerText = "On Air";
    }

    function stopVisualizer() {
      clearInterval(visualizerInterval);
      visualizerInterval = null;
      bars.forEach(b => { b.style.height = '8px'; b.classList.remove('active'); });
      statusDot.classList.remove('live');
      statusText.innerText = "Idle";
    }

    function connect() {
      ws = new WebSocket('ws://' + window.location.host + '/ws');
      ws.onopen = () => { statusText.innerText = 'Connected'; };
      
      ws.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'status') {
          statusText.innerText = msg.message;
        } else if (msg.type === 'chunk') {
          await queueAudioChunk(msg);
        } else if (msg.type === 'done') {
          isGenerating = false;
          checkAutoContinue();
        } else if (msg.type === 'error') {
            console.error(msg.message);
            isGenerating = false;
        }
      };
      
      ws.onclose = () => {
        statusText.innerText = 'Reconnecting...';
        setTimeout(connect, 2000);
      };
    }

    startBtn.onclick = async () => {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      nextStartTime = audioContext.currentTime + 0.5; 
      
      ws.send('START');
      isGenerating = true;
      
      startBtn.style.display = 'none';
      micBtn.style.display = 'flex';
      transcriptDiv.innerHTML = '';
      audioQueue = [];
      
      initMic();
    };

    async function initMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            ws.send(audioBlob); // Send binary data direct to fast-whisper
            audioChunks = [];
        };
    }

    micBtn.onmousedown = () => {
        if(!mediaRecorder) return;
        micBtn.classList.add('recording');
        micBtn.innerText = '🎙️ Recording... Release to send';
        
        audioQueue = [];
        nextStartTime = audioContext.currentTime + 0.2; 
        stopVisualizer();
        
        isGenerating = true;
        mediaRecorder.start();
    };

    micBtn.onmouseup = () => {
        if(!mediaRecorder) return;
        micBtn.classList.remove('recording');
        micBtn.innerText = '🎤 Hold to Speak';
        mediaRecorder.stop();
        addSystemNote("Audio sent to Whisper STT...");
    };
    
    // For touch devices
    micBtn.ontouchstart = (e) => { e.preventDefault(); micBtn.onmousedown(); };
    micBtn.ontouchend = (e) => { e.preventDefault(); micBtn.onmouseup(); };

    function addSystemNote(text) {
        const div = document.createElement('div');
        div.className = 'line';
        div.style.color = '#fff';
        div.style.background = 'rgba(56, 189, 248, 0.2)';
        div.style.padding = '8px 12px';
        div.style.borderRadius = '8px';
        div.innerHTML = `<span style="font-weight:bold; color:#38bdf8;">=> System:</span> ${text}`;
        transcriptDiv.appendChild(div);
        transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
    }

    function addLineToTranscript(speaker, text, overlap, id) {
        document.querySelectorAll('.line').forEach(el => el.classList.add('dimmed'));
        const div = document.createElement('div');
        div.className = 'line active';
        div.id = id;
        let headerHtml = `<span class="speaker-label speaker-${speaker}">${speaker}</span>`;
        if (overlap) headerHtml += `<span class="overlap-tag">OVERLAP</span>`;
        div.innerHTML = `<div style="display:flex; gap:8px; align-items:center;">${headerHtml}</div><div style="margin-top:4px; font-weight:${speaker==='Director'?'bold':'normal'};">${text}</div>`;
        transcriptDiv.appendChild(div);
        transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
        startVisualizer();
    }

    async function queueAudioChunk(chunkMsg) {
      const lineId = 'line-' + Math.random().toString(36).substr(2, 9);
      addLineToTranscript(chunkMsg.speaker, chunkMsg.text, chunkMsg.overlap, lineId);

      // Decode base64 to ArrayBuffer
      const binaryString = window.atob(chunkMsg.audio);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
      const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
      
      audioQueue.push({ buffer: audioBuffer, overlap: chunkMsg.overlap, id: lineId });
      playQueueManager();
    }

    let isConsumingQueue = false;
    async function playQueueManager() {
       if (isConsumingQueue || audioQueue.length === 0) return;
       isConsumingQueue = true;
       
       while (audioQueue.length > 0) {
          const item = audioQueue.shift();
          
          const source = audioContext.createBufferSource();
          source.buffer = item.buffer;
          source.connect(audioContext.destination);
          
          let scheduledTime = nextStartTime;
          const now = audioContext.currentTime;
          
          if (scheduledTime < now) scheduledTime = now + 0.1;
          if (item.overlap) scheduledTime -= 0.6; 
          else scheduledTime -= 0.15; 
          if (scheduledTime < now) scheduledTime = now;
          
          source.start(scheduledTime);
          nextStartTime = scheduledTime + item.buffer.duration;
          
          await new Promise(resolve => { source.onended = resolve; });
          checkAutoContinue();
       }
       
       isConsumingQueue = false;
       stopVisualizer();
    }
    
    function checkAutoContinue() {
        if (audioQueue.length === 0 && !isGenerating) {
            isGenerating = true;
            ws.send('CONTINUE');
        }
    }

    connect();
  </script>
</body>
</html>
