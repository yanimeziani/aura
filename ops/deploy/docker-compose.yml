services:
  pegasus-web:
    build:
      context: ../../
      dockerfile: web/Dockerfile
    container_name: pegasus-web
    restart: unless-stopped
    environment:
      PEGASUS_WEB_HOST: 0.0.0.0
      PEGASUS_WEB_PORT: 8080
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - pegasus-net

  pegasus-api:
    build:
      context: ../../backend/pegasus-api
      dockerfile: Dockerfile
    container_name: pegasus-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - pegasus-data:/data/cerberus
    networks:
      - pegasus-net

volumes:
  pegasus-data:

networks:
  pegasus-net:
    driver: bridge
