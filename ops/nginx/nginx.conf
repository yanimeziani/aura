user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream cerberus_gateway {
        server 127.0.0.1:3000;
    }

    upstream pegasus_api {
        server 127.0.0.1:8080;
    }

    upstream aura_gateway {
        server 127.0.0.1:8765;
    }

    upstream aura_dashboard {
        server 127.0.0.1:3003;
    }

    # meziani.ai — public landing page
    server {
        listen 80;
        server_name meziani.ai www.meziani.ai;

        root /opt/apps/web/public/launch;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Allow gateway API calls from landing page
        location /gw/ {
            proxy_pass http://aura_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # nexa.meziani.ai — dedicated Nexa surface
    server {
        listen 80;
        server_name nexa.meziani.ai;

        location / {
            proxy_pass http://aura_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }

    server {
        listen 443 ssl;
        server_name nexa.meziani.ai;

        ssl_certificate /etc/nexa/tls/nexa.meziani.ai.crt;
        ssl_certificate_key /etc/nexa/tls/nexa.meziani.ai.key;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://aura_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }

    # meziani.org — sovereign operator stack
    server {
        listen 80 default_server;
        server_name meziani.org www.meziani.org _;

        # Nexa Gateway API
        location /gw/ {
            proxy_pass http://aura_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Nexa Mission Control Dashboard
        location /dashboard {
            proxy_pass http://aura_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Launch assets (static)
        location /launch/ {
            alias /opt/apps/web/public/launch/;
            autoindex off;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # Pegasus API
        location /api/ {
            proxy_pass http://pegasus_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # Cerberus gateway
        location /gateway/ {
            proxy_pass http://cerberus_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Root -> Mission Control shell
        location = / {
            proxy_pass http://aura_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Fallback -> cerberus gateway
        location / {
            proxy_pass http://cerberus_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
