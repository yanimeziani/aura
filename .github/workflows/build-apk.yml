name: Build Optimized Pegasus APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: 36
  BUILD_TOOLS_VERSION: '34.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        build_type: [debug, release]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: ${{ env.ANDROID_API_LEVEL }}
        build-tools: ${{ env.BUILD_TOOLS_VERSION }}
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    # - name: Validate Gradle wrapper
    #   uses: gradle/wrapper-validation-action@v2
      
    # - name: Run tests
    #   run: ./gradlew test --stacktrace
        
    - name: Build APK (${{ matrix.build_type }})
      run: |
        # Set environment variables for Android build optimization
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.parallel=false"
        export ANDROID_AAPT2_FROM_MAVEN=true
        
        if [ "${{ matrix.build_type }}" == "release" ]; then
          ./gradlew assembleRelease --stacktrace --no-daemon --no-parallel
        else
          ./gradlew assembleDebug --stacktrace --no-daemon --no-parallel
        fi
        
    - name: Sign APK (Release only)
      if: matrix.build_type == 'release'
      run: |
        echo "Signing release APK with debug keystore for demo purposes"
        # In production, use proper signing with secrets
        
    - name: Optimize APK (Release only)
      if: matrix.build_type == 'release'
      run: |
        cd app/build/outputs/apk/release
        ls -la
        echo "APK size optimization results:"
        du -h *.apk
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: pegasus-${{ matrix.build_type }}-apk
        path: |
          app/build/outputs/apk/${{ matrix.build_type }}/*.apk
        retention-days: 30
        
    - name: Upload mapping files (Release only)
      if: matrix.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: pegasus-release-mapping
        path: |
          app/build/outputs/mapping/release/mapping.txt
        retention-days: 90
        
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
        
    - name: Download release APK
      uses: actions/download-artifact@v4
      with:
        name: pegasus-release-apk
        path: ./apk
        
    - name: Run APK analysis
      run: |
        echo "=== APK Analysis ==="
        cd apk
        for apk in *.apk; do
          echo "Analyzing: $apk"
          echo "Size: $(du -h $apk)"
          # Add more analysis tools here
        done
        
    - name: Performance benchmark
      run: |
        echo "=== Performance Benchmark ==="
        echo "Liquid Glass Render Engine Performance Test"
        ./gradlew :app:testReleaseUnitTest --tests="*RenderEngine*" --stacktrace || true
        
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, performance-test]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        
    - name: Create release notes
      run: |
        cat > release_notes.md << EOF
        # Pegasus v${{ github.ref_name }}
        
        ## ✨ Features
        - **Enhanced Liquid Glass Render Engine**: High-performance iOS 16-style visual effects
        - **1:1 iOS 16 Design**: Pixel-perfect recreation of iOS 16 design language
        - **Optimized Performance**: Advanced ProGuard rules and R8 optimizations
        - **Haptic Feedback**: iOS-style tactile interactions
        
        ## 🚀 Technical Improvements
        - Custom Kotlin render engine for liquid glass effects
        - iOS 16 typography system with SF Pro font equivalents  
        - Enhanced Material 3 components with glass morphism
        - Optimized APK size with advanced code minification
        
        ## 📱 Build Information
        - **Target SDK**: Android API 36
        - **Min SDK**: Android API 28
        - **Architecture**: ARM64 only for optimal performance
        - **Size**: Optimized for minimal footprint
        
        ## 📦 Downloads
        - **Release APK**: Production-ready build with full optimizations
        - **Debug APK**: Development build with debugging enabled
        EOF
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        files: |
          artifacts/pegasus-release-apk/*.apk
          artifacts/pegasus-debug-apk/*.apk
          artifacts/pegasus-release-mapping/*.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-firebase:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download release APK
      uses: actions/download-artifact@v4
      with:
        name: pegasus-release-apk
        path: ./apk
        
    - name: Deploy to Firebase App Distribution
      run: |
        echo "Firebase App Distribution deployment would happen here"
        echo "APK ready for distribution: $(ls -la ./apk/)"
        # Uncomment and configure when Firebase project is set up
        # uses: wzieba/Firebase-Distribution-Github-Action@v1
        # with:
        #   appId: ${{ secrets.FIREBASE_APP_ID }}
        #   serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        #   groups: testers
        #   file: ./apk/app-release.apk