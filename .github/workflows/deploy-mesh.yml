# Full pipeline: deploy → smoke test. Fail the run if tests fail (fix and push to redeploy).
# Secrets: MESH_SSH_KEY. Optional: MESH_SSH_HOST, MESH_SSH_USER, MESH_LANDING_URL.

name: Deploy → Test (mesh)

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'ops/**'
      - 'apps/aura-dashboard/**'
      - 'apps/aura-landing-next/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MESH_SSH_HOST: ${{ secrets.MESH_SSH_HOST }}
      MESH_SSH_USER: ${{ secrets.MESH_SSH_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Nexa landing export
        run: |
          npm ci --workspace apps/aura-landing-next
          npm run build --workspace apps/aura-landing-next

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MESH_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          VPS_IP="${MESH_SSH_HOST:-89.116.170.202}"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to mesh
        run: |
          export VPS_IP="${MESH_SSH_HOST:-89.116.170.202}"
          export VPS_USER="${MESH_SSH_USER:-root}"
          export NEXA_REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          export NEXA_REPO_REF="${GITHUB_REF_NAME}"
          export NEXA_DEPLOY_WEB_APP=0
          chmod +x ops/scripts/deploy-mesh.sh
          REPO_ROOT="$PWD" ./ops/scripts/deploy-mesh.sh

  test:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      MESH_SSH_HOST: ${{ secrets.MESH_SSH_HOST }}
      MESH_LANDING_URL: ${{ secrets.MESH_LANDING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test mesh
        run: |
          export MESH_VPS_IP="${MESH_SSH_HOST:-89.116.170.202}"
          export MESH_LANDING_URL="${MESH_LANDING_URL:-https://nexa.meziani.ai}"
          export MESH_SKIP_WEB_HEALTH=1
          export MESH_SKIP_GATEWAY_INGRESS=1
          export MESH_ALLOW_INSECURE_TLS=1
          chmod +x ops/scripts/smoke-test-mesh.sh
          ./ops/scripts/smoke-test-mesh.sh
