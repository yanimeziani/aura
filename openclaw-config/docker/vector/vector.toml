# ── Internal metrics (optional) ──────────────────────────────────────────────

[sources.vector_metrics]
type = "internal_metrics"

[sinks.metrics_log]
type   = "file"
inputs = ["vector_metrics"]
path   = "/data/logs/vector-metrics.log"
encoding.codec = "json"
