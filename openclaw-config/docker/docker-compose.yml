version: "3.9"

# OpenClaw Full Stack — Dragun.app
# Runs on Debian VPS
# Usage: docker compose up -d

x-common-env: &common-env
  TZ: UTC
  LOG_LEVEL: info

x-restart: &restart
  restart: unless-stopped

networks:
  openclaw:
    driver: bridge

volumes:
  openclaw-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/openclaw
  dragun-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/dragun

services:

  # ── OpenClaw Orchestrator ─────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: orchestrator.Dockerfile
    container_name: openclaw
    <<: *restart
    networks: [openclaw]
    volumes:
      - openclaw-state:/data/openclaw
      - dragun-data:/data/dragun
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENCLAW_CONFIG_PATH: /data/openclaw/config
      OPENCLAW_ARTIFACTS_PATH: /data/openclaw/artifacts
      OPENCLAW_HITL_QUEUE: /data/openclaw/hitl-queue
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL}"
      DAILY_SPEND_CAP_USD: "${DAILY_SPEND_CAP_USD:-5.00}"
    ports:
      - "127.0.0.1:8080:8080"    # dashboard API (localhost only — caddy proxies)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "openclaw.component=orchestrator"

  # ── DevSecOps Agent ───────────────────────────────────────────────────────
  agent-devsecops:
    build:
      context: ..
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_ID: devsecops
    container_name: agent-devsecops
    <<: *restart
    networks: [openclaw]
    volumes:
      - openclaw-state:/data/openclaw
      - dragun-data:/data/dragun
      - /root/.claude:/mnt/claude-auth:ro
    environment:
      <<: *common-env
      AGENT_ID: devsecops
      AGENT_CONFIG: /data/openclaw/config/agents/devsecops/config.yaml
      OPENCLAW_ORCHESTRATOR_URL: http://openclaw:8080
      AGENT_SCHEDULE: always_on
      CLAUDE_SKIP_AUTO_UPDATE: "1"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    depends_on:
      openclaw:
        condition: service_healthy
    labels:
      - "openclaw.component=agent"
      - "openclaw.agent=devsecops"

  # ── Growth Agent ──────────────────────────────────────────────────────────
  agent-growth:
    build:
      context: ..
      dockerfile: docker/agent.Dockerfile
      args:
        AGENT_ID: growth
    container_name: agent-growth
    <<: *restart
    networks: [openclaw]
    volumes:
      - openclaw-state:/data/openclaw
      - dragun-data:/data/dragun
      - /root/.claude:/mnt/claude-auth:ro
    environment:
      <<: *common-env
      AGENT_ID: growth
      AGENT_CONFIG: /data/openclaw/config/agents/growth/config.yaml
      OPENCLAW_ORCHESTRATOR_URL: http://openclaw:8080
      AGENT_SCHEDULE: burst
      BURST_CRON: "0 2 * * *"
      CLAUDE_SKIP_AUTO_UPDATE: "1"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    depends_on:
      openclaw:
        condition: service_healthy
    labels:
      - "openclaw.component=agent"
      - "openclaw.agent=growth"

  # ── Caddy (reverse proxy / TLS) ───────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    <<: *restart
    networks: [openclaw]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/openclaw/caddy-data:/data
      - /data/openclaw/caddy-config:/config
      - /data/openclaw/logs:/data/logs    # caddy writes access logs here
    environment:
      DOMAIN: "${DOMAIN:-dragun.app}"
    labels:
      - "openclaw.component=proxy"

  # ── Observability: log aggregation ────────────────────────────────────────
  vector:
    image: timberio/vector:0.42.0-alpine
    container_name: vector
    <<: *restart
    networks: [openclaw]
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/openclaw/logs:/data/logs
    environment:
      <<: *common-env
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL}"
    labels:
      - "openclaw.component=observability"

  # ── Uptime check (lightweight synthetic) ──────────────────────────────────
  uptime-check:
    image: alpine:3
    container_name: uptime-check
    <<: *restart
    networks: [openclaw]
    entrypoint: >
      sh -c "
        while true; do
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://openclaw:8080/health || echo '000')
          if [ \"$STATUS\" != '200' ]; then
            echo \"[uptime-check] WARN: openclaw health returned $STATUS\" >&2
          fi
          sleep 60
        done
      "
    labels:
      - "openclaw.component=uptime"
