# Growth Hacking Coder Agent — OpenClaw Configuration
# BMAD v6 | Dragun.app

agent:
  id: growth
  name: "Growth Hacking Coder Agent"
  version: "1.0"
  schedule: burst             # nightly batch + on-demand; pauses on incident
  burst_schedule: "0 2 * * *" # nightly at 02:00 UTC
  branch_prefix: agent/growth
  pause_on_incident: true     # DevSecOps can pause this agent

# Model routing
model_routing:
  cheap:
    model: claude-haiku-4-5-20251001
    use_for:
      - template_generation
      - content_pipeline_batch
      - report_formatting
      - data_extraction
      - seo_metadata_generation
      - email_copy_drafting
  mid:
    model: claude-sonnet-4-6
    use_for:
      - scraper_logic
      - ab_variant_code
      - analytics_instrumentation
      - seo_strategy
      - funnel_analysis_moderate
  top:
    model: claude-sonnet-4-6    # swap to claude-opus-4-6 for complex strategy
    use_for:
      - complex_experiment_design
      - conversion_architecture
      - growth_strategy_deep_analysis

# Spend caps
cost_caps:
  daily_usd: 2.00             # lower cap than DevSecOps; growth is less urgent
  per_task_usd: 0.30
  warning_threshold_pct: 80
  hard_cap_action: pause_agent_and_alert

# Tools available
tools:
  - name: ripgrep
    use_for: repo_search
  - name: diff_viewer
    use_for: patch_preview
  - name: http_client
    use_for: scraper_requests
  - name: robots_txt_checker
    use_for: scraper_compliance
  - name: feature_flag_client
    use_for: ab_experiments
  - name: analytics_client
    use_for: metrics_pull
  - name: template_renderer
    use_for: seo_page_generation
  - name: structured_logger
    use_for: artifact_output

# Risk label taxonomy
risk_labels:
  SAFE:
    description: "No external impact, no user data, no comms, no spend"
    requires_hitl: false
    can_auto_deploy: true
  REVIEW:
    description: "External comms, scraping, user-facing changes, paid channels"
    requires_hitl: true
    can_auto_deploy: false
  BLOCKED:
    description: "Violates ToS, involves PII export, legal/compliance risk"
    requires_hitl: false   # blocked = do not proceed at all
    can_auto_deploy: false
    action: escalate_to_yani

# HITL gates
hitl_gates:
  - action: email_send
    trigger: always
  - action: sms_send
    trigger: always
  - action: paid_ads_activation
    trigger: always
  - action: pii_export
    trigger: always
  - action: scraper_first_run
    trigger: risk_label == REVIEW
  - action: ab_test_activation
    trigger: traffic_split > 0.10

# Artifact storage
artifacts:
  base_path: /data/openclaw/artifacts/growth
  retention_days: 30
  format: markdown
  push_summaries_to_repo: true
  summary_path: ops/logs/growth

# Experiment tracking
experiments:
  require_hypothesis: true
  require_measurable_outcome: true
  require_feature_flag: true        # all live-user experiments must use flags
  require_rollback_plan: true

# Escalation routing
escalation:
  infra_needed: devsecops
  legal_unclear: yani
  measurement_undefined: yani
