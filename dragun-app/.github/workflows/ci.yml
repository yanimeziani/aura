name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: i18n parity
        run: npm run i18n:check

      - name: Build
        env:
          NEXT_PUBLIC_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon
          SUPABASE_SERVICE_ROLE_KEY: test_service_role
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          ARCJET_KEY: aj_dummy
          SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
          DEBTOR_PORTAL_SECRET: 01234567890123456789012345678901
          STRIPE_PRICE_STARTER: price_dummy_starter
          STRIPE_PRICE_GROWTH: price_dummy_growth
          STRIPE_PRICE_SCALE: price_dummy_scale
          AI_PROVIDER: local
          LOCAL_API_BASE_URL: http://127.0.0.1:11434/v1
        run: npm run build
