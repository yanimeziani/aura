# Cost Caps Policy — Cerberus / Pegasus
# Hard limits on daily and per-agent API spend.
# Agents must enforce these; Cerberus runtime and Pegasus API enforce at runtime.

version: "1.0"

# Global daily cap (all agents combined)
global:
  daily_usd: 5.00
  warning_threshold_pct: 70     # alert at 70% of global cap
  hard_cap_action: pause_all_non_critical
  hard_cap_notify: true

# Per-agent daily caps
agents:
  devsecops:
    daily_usd: 3.00
    per_task_usd: 0.50
    warning_threshold_pct: 80
    hard_cap_action: downgrade_to_cheap_and_alert
    exemptions:
      - task: production_incident   # P1 incidents bypass cap; always notify
        override: unlimited
        require_hitl_before: false
        post_run_notify: true

  growth:
    daily_usd: 2.00
    per_task_usd: 0.30
    warning_threshold_pct: 80
    hard_cap_action: pause_agent_and_alert
    exemptions: []                # growth has no cost exemptions

# Panic mode (triggered manually or by global cap breach)
panic_mode:
  trigger_conditions:
    - global_daily_usd_spent > 4.50     # 90% of global cap
    - manual: "cerberus panic on"
  effects:
    - pause: growth_agent
    - devsecops: cheap_model_only
    - devsecops: p1_incidents_exempt
    - notify: yani_immediate
  deactivate:
    - manual: "cerberus panic off"
    - condition: "next_day_reset AND manual_confirm"

# Weekly budget (informational, not hard-enforced)
weekly_budget_usd: 25.00

# Reporting
reporting:
  daily_cost_report: true
  report_path: ops/logs/cost
  include_per_model_breakdown: true
  include_per_task_breakdown: true
