services:
  pegasus-api:
    build:
      context: ../../backend/pegasus-api
      dockerfile: Dockerfile
    container_name: pegasus-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - pegasus-data:/data/cerberus
    networks:
      - pegasus-net

volumes:
  pegasus-data:

networks:
  pegasus-net:
    driver: bridge
