<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Sovereign Outreach Network</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #06060c; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif; overflow: hidden; }
#canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

.hud { position: fixed; z-index: 10; pointer-events: none; }

/* Top-left: Identity */
.hud-top { top: 28px; left: 36px; }
.hud-top h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 5px; color: #fff; }
.hud-top .sub { color: #556; font-size: 0.8rem; margin-top: 2px; letter-spacing: 1px; }
.hud-top .role { color: #4af; font-size: 0.7rem; margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; }

/* Top-right: Metrics */
.hud-right { top: 28px; right: 36px; text-align: right; }
.metric { margin-bottom: 14px; }
.metric-val { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.metric-label { font-size: 0.65rem; color: #445; letter-spacing: 2px; text-transform: uppercase; }

/* Bottom: Targets + Status */
.hud-bottom { bottom: 28px; left: 36px; right: 36px; display: flex; justify-content: space-between; align-items: flex-end; }
.targets { display: flex; gap: 20px; flex-wrap: wrap; }
.target { opacity: 0; transition: opacity 0.8s; }
.target.active { opacity: 1; }
.target-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.target-name { font-size: 0.75rem; font-weight: 600; }
.target-region { font-size: 0.6rem; color: #445; letter-spacing: 1px; text-transform: uppercase; }
.target-type { font-size: 0.55rem; color: #334; margin-top: 1px; }

.status { text-align: right; }
.status-line { font-size: 0.65rem; color: #334; font-variant-numeric: tabular-nums; }
.status-line.live { color: #4f8; }

/* Center overlay for phase label */
.phase-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; text-align: center; pointer-events: none; opacity: 0; transition: opacity 1s; }
.phase-overlay.visible { opacity: 1; }
.phase-title { font-size: 0.7rem; color: #4af; letter-spacing: 4px; text-transform: uppercase; }
.phase-desc { font-size: 0.55rem; color: #334; margin-top: 4px; letter-spacing: 1px; }

/* Agent legend */
.legend { position: fixed; bottom: 80px; right: 36px; z-index: 10; pointer-events: none; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-label { font-size: 0.6rem; color: #445; letter-spacing: 1px; }

footer { position: fixed; bottom: 6px; left: 0; right: 0; text-align: center; z-index: 10; }
footer a { color: #223; text-decoration: none; font-size: 0.6rem; letter-spacing: 1px; pointer-events: all; }
footer a:hover { color: #4af; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud hud-top">
  <h1>NEXA</h1>
  <div class="sub">Sovereign Agentic Infrastructure</div>
  <div class="role">OSS protocol launch surface</div>
</div>

<div class="hud hud-right">
  <div class="metric">
    <div class="metric-val" id="m-agents" style="color:#4af">0</div>
    <div class="metric-label">Active Agents</div>
  </div>
  <div class="metric">
    <div class="metric-val" id="m-channels" style="color:#4f8">0</div>
    <div class="metric-label">Outreach Channels</div>
  </div>
  <div class="metric">
    <div class="metric-val" id="m-regions" style="color:#fa4">0</div>
    <div class="metric-label">Regions</div>
  </div>
  <div class="metric">
    <div class="metric-val" id="m-coverage" style="color:#a8f">0%</div>
    <div class="metric-label">Coverage</div>
  </div>
</div>

<div id="phase-overlay" class="phase-overlay">
  <div class="phase-title" id="phase-title"></div>
  <div class="phase-desc" id="phase-desc"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4af"></div><div class="legend-label">Media Outreach</div></div>
  <div class="legend-item"><div class="legend-dot" style="background:#4f8"></div><div class="legend-label">Career Network</div></div>
  <div class="legend-item"><div class="legend-dot" style="background:#fa4"></div><div class="legend-label">Academic / arXiv</div></div>
  <div class="legend-item"><div class="legend-dot" style="background:#a8f"></div><div class="legend-label">Institutional / UN</div></div>
  <div class="legend-item"><div class="legend-dot" style="background:#fff;opacity:0.6"></div><div class="legend-label">Origin Node (VPS)</div></div>
</div>

<div class="hud hud-bottom">
  <div class="targets" id="targets"></div>
  <div class="status">
    <div class="status-line live" id="s-live">LIVE</div>
    <div class="status-line" id="s-time"></div>
    <div class="status-line" id="s-uptime" style="color:#223"></div>
  </div>
</div>

<footer><a href="/docs/nexa">nexa.global/docs</a></footer>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/controls/OrbitControls.js';

const R = 2.0;

// ── Operation targets — reflects Nexa's public outreach surface ───
// Each target maps to a real channel in the launch plan
const TARGETS = [
  // Media outreach (Career-Twin + Media Agent)
  { name: 'Radio-Canada',      region: 'Montreal',    type: 'Media',    lat: 45.50, lon: -73.57, color: 0x44aaff, delay: 0 },
  { name: 'CBC / Globe & Mail',region: 'Toronto',     type: 'Media',    lat: 43.65, lon: -79.38, color: 0x44aaff, delay: 600 },
  // Career / Resume channels (Career Digital Twin)
  { name: 'LinkedIn Network',  region: 'San Francisco',type:'Career',   lat: 37.77, lon:-122.42, color: 0x44ff88, delay: 1200 },
  { name: 'Career Channels',   region: 'London',      type: 'Career',   lat: 51.51, lon:  -0.13, color: 0x44ff88, delay: 1800 },
  // Algeria cluster (SDR Agent)
  { name: 'Algeria Tech',      region: 'Algiers',     type: 'Media',    lat: 36.75, lon:   3.06, color: 0x44aaff, delay: 2400 },
  // Academic (arXiv bridge)
  { name: 'arXiv / Academia',  region: 'Cambridge',   type: 'Academic', lat: 42.37, lon: -71.12, color: 0xffaa44, delay: 3000 },
  // Australia cluster
  { name: 'Australia Tech',    region: 'Canberra',    type: 'Media',    lat:-35.28, lon: 149.13, color: 0x44aaff, delay: 3600 },
  // UN / Institutional
  { name: 'United Nations HQ', region: 'New York',    type: 'UN',       lat: 40.75, lon: -73.97, color: 0xaa88ff, delay: 4200 },
  { name: 'UN Geneva',         region: 'Switzerland', type: 'UN',       lat: 46.23, lon:   6.14, color: 0xaa88ff, delay: 4800 },
  { name: 'EU Digital',        region: 'Brussels',    type: 'UN',       lat: 50.85, lon:   4.35, color: 0xaa88ff, delay: 5400 },
];

// Origin: sovereign VPS node + operator launch region
const ORIGIN = { lat: 50.11, lon: 8.68 }; // Frankfurt (VPS datacenter)
const FOUNDER = { lat: 45.50, lon: -73.57 }; // Montreal

// Phases shown on screen
const PHASES = [
  { t: 500,  title: 'Initializing Cerberus Gateway', desc: 'Sovereign node online' },
  { t: 2000, title: 'Media Outreach Campaign', desc: 'Radio-Canada • CBC • Globe & Mail' },
  { t: 4000, title: 'Career Network Activation', desc: 'LinkedIn • Professional channels' },
  { t: 6000, title: 'Academic Bridge', desc: 'arXiv paper • ORCID: 0009-0007-4348-8711' },
  { t: 7500, title: 'Institutional Outreach', desc: 'United Nations • EU Digital' },
  { t: 9000, title: 'Full Coverage', desc: 'All agents operational' },
];

function ll2v(lat, lon, r) {
  const p = (90-lat)*Math.PI/180, t = (lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t));
}

function makeArc(a, b, color) {
  const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
  mid.normalize().multiplyScalar(R + 0.3 + a.distanceTo(b)*0.12);
  const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
  const pts = curve.getPoints(64);
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  g.setDrawRange(0, 0);
  const m = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 });
  const line = new THREE.Line(g, m);
  line.userData = { total: pts.length };
  return line;
}

// ── Scene ──────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ren = new THREE.WebGLRenderer({ canvas, antialias: true });
ren.setPixelRatio(Math.min(devicePixelRatio, 2));
ren.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
cam.position.set(0, 1.8, 5.2);

const ctrl = new OrbitControls(cam, canvas);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.05;
ctrl.enablePan = false; ctrl.minDistance = 3.5; ctrl.maxDistance = 8;
ctrl.autoRotate = true; ctrl.autoRotateSpeed = 0.25;

scene.add(new THREE.AmbientLight(0x223344, 0.5));
const dl = new THREE.DirectionalLight(0x4488ff, 0.3);
dl.position.set(5, 3, 5); scene.add(dl);

// Globe
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R, 72, 54),
  new THREE.MeshBasicMaterial({ color: 0x112233, wireframe: true, transparent: true, opacity: 0.12 })));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R-0.01, 72, 54),
  new THREE.MeshPhongMaterial({ color: 0x080810, transparent: true, opacity: 0.95 })));

// Atmosphere
const atmosMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `varying vec3 vN; void main(){ float i=pow(0.62-dot(vN,vec3(0,0,1)),3.); gl_FragColor=vec4(0.15,0.4,1.,i*0.35); }`,
  blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.015, 64, 48), atmosMat));

// Grid lines
function grid(v, isLat) {
  const pts = [];
  for (let i=0; i<=360; i+=4) pts.push(isLat ? ll2v(v,i,R+0.002) : ll2v(i-180,v,R+0.002));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.15 })));
}
for (let l=-60;l<=60;l+=30) grid(l,true);
for (let l=-150;l<=180;l+=30) grid(l,false);

// Dot field
const dg = new THREE.BufferGeometry();
const dp = new Float32Array(600*3);
for (let i=0;i<600;i++) {
  const t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1), r=R+0.005+Math.random()*0.008;
  dp[i*3]=r*Math.sin(p)*Math.cos(t); dp[i*3+1]=r*Math.cos(p); dp[i*3+2]=r*Math.sin(p)*Math.sin(t);
}
dg.setAttribute('position', new THREE.BufferAttribute(dp, 3));
scene.add(new THREE.Points(dg, new THREE.PointsMaterial({ color:0x334455, size:0.007, transparent:true, opacity:0.3 })));

// ── Origin + Founder nodes ─────────────────────────────────────
const originPos = ll2v(ORIGIN.lat, ORIGIN.lon, R+0.01);
const founderPos = ll2v(FOUNDER.lat, FOUNDER.lon, R+0.01);

// VPS node (white pulse)
const oMesh = new THREE.Mesh(new THREE.SphereGeometry(0.025,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
oMesh.position.copy(originPos); scene.add(oMesh);
const oPulse = new THREE.Mesh(new THREE.RingGeometry(0,0.05,32), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.7,side:THREE.DoubleSide}));
oPulse.position.copy(originPos); oPulse.lookAt(0,0,0); scene.add(oPulse);

// Founder node (cyan)
const fMesh = new THREE.Mesh(new THREE.SphereGeometry(0.03,16,16), new THREE.MeshBasicMaterial({color:0x44aaff}));
fMesh.position.copy(founderPos); scene.add(fMesh);
const fPulse = new THREE.Mesh(new THREE.RingGeometry(0,0.06,32), new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.8,side:THREE.DoubleSide}));
fPulse.position.copy(founderPos); fPulse.lookAt(0,0,0); scene.add(fPulse);

// Origin-Founder backbone arc
const backbone = makeArc(originPos, founderPos, 0x44aaff);
backbone.visible = true; scene.add(backbone);

// ── Targets ────────────────────────────────────────────────────
const arcs = [], pulses = [], tEls = [];
const t0 = performance.now();

TARGETS.forEach((t, i) => {
  const pos = ll2v(t.lat, t.lon, R+0.01);
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02,16,16), new THREE.MeshBasicMaterial({color:t.color}));
  dot.position.copy(pos); dot.visible = false; scene.add(dot);

  const ring = new THREE.Mesh(new THREE.RingGeometry(0,0.04,32), new THREE.MeshBasicMaterial({color:t.color,transparent:true,opacity:0.7,side:THREE.DoubleSide}));
  ring.position.copy(pos); ring.lookAt(0,0,0); ring.visible = false; scene.add(ring);
  pulses.push(ring);

  // Arc from founder (Yani) to target
  const arc = makeArc(founderPos, pos, t.color);
  arc.visible = false; scene.add(arc);
  arcs.push({ line: arc, dot, delay: t.delay, on: false });

  const el = document.createElement('div');
  el.className = 'target';
  el.innerHTML = `<span class="target-dot" style="background:#${t.color.toString(16).padStart(6,'0')};box-shadow:0 0 6px #${t.color.toString(16).padStart(6,'0')}"></span><span class="target-name">${t.name}</span><br><span class="target-region">${t.region}</span><div class="target-type">${t.type} Agent</div>`;
  document.getElementById('targets').appendChild(el);
  tEls.push(el);
});

// ── HUD refs ───────────────────────────────────────────────────
const mAgents = document.getElementById('m-agents');
const mChannels = document.getElementById('m-channels');
const mRegions = document.getElementById('m-regions');
const mCoverage = document.getElementById('m-coverage');
const sTime = document.getElementById('s-time');
const sUptime = document.getElementById('s-uptime');
const phaseOvl = document.getElementById('phase-overlay');
const phaseTitle = document.getElementById('phase-title');
const phaseDesc = document.getElementById('phase-desc');

let activeNodes = 0, lastPhase = -1;
const agentTypes = new Set();
const regionSet = new Set();

// ── Animate ────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = performance.now() - t0;

  // Backbone draw
  const bbProg = Math.min(dt / 1000, 1);
  backbone.geometry.setDrawRange(0, Math.floor(bbProg * 64));

  // Activate targets
  arcs.forEach((a, i) => {
    if (!a.on && dt > a.delay + 1500) {
      a.on = true; a.line.visible = true; a.dot.visible = true;
      pulses[i].visible = true; tEls[i].classList.add('active');
      activeNodes++;
      agentTypes.add(TARGETS[i].type);
      regionSet.add(TARGETS[i].region);
    }
    if (a.on) {
      const p = Math.min((dt - a.delay - 1500) / 1200, 1);
      a.line.geometry.setDrawRange(0, Math.floor(p * 64));
    }
  });

  // Pulses
  const pTime = dt * 0.003;
  pulses.forEach(p => { if (!p.visible) return; const s=1+Math.sin(pTime+p.id*0.5)*0.25; p.scale.set(s,s,s); p.material.opacity=0.4+Math.sin(pTime)*0.3; });
  const os=1+Math.sin(pTime*0.8)*0.35; oPulse.scale.set(os,os,os); oPulse.material.opacity=0.4+Math.sin(pTime*0.8)*0.3;
  const fs=1+Math.sin(pTime*0.9)*0.3; fPulse.scale.set(fs,fs,fs); fPulse.material.opacity=0.5+Math.sin(pTime*0.9)*0.25;

  // Phase overlay
  let currentPhase = -1;
  for (let i=PHASES.length-1; i>=0; i--) { if (dt > PHASES[i].t) { currentPhase = i; break; } }
  if (currentPhase !== lastPhase && currentPhase >= 0) {
    lastPhase = currentPhase;
    phaseTitle.textContent = PHASES[currentPhase].title;
    phaseDesc.textContent = PHASES[currentPhase].desc;
    phaseOvl.classList.add('visible');
    setTimeout(() => phaseOvl.classList.remove('visible'), 2500);
  }

  // HUD
  // Agents: Career-Twin, SDR, Media = 3 core agents + 1 gateway
  const agentCount = Math.min(1 + Math.floor(dt / 2000), 4);
  mAgents.textContent = agentCount;
  mChannels.textContent = activeNodes;
  mRegions.textContent = regionSet.size;
  mCoverage.textContent = Math.min(Math.round(activeNodes / TARGETS.length * 100), 100) + '%';

  const now = new Date();
  sTime.textContent = now.toISOString().slice(11, 19) + ' UTC';
  sUptime.textContent = 'T+' + (dt/1000).toFixed(0) + 's';

  ctrl.update();
  ren.render(scene, cam);
}
animate();

addEventListener('resize', () => {
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  ren.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
