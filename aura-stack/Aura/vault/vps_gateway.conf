# FINAL VPS GATEWAY CONFIGURATION
# Apply this to /etc/caddy/Caddyfile on your Hostinger VPS

meziani.ai, meziani.org {
    # 1. SSL is handled HERE on the VPS (DNS points here)
    tls {
        issuer acme {
            dir https://acme-v02.api.letsencrypt.org/directory
        }
        issuer acme {
            dir https://acme.zerossl.com/v2/DV90
        }
    }

    # 2. Proxy everything to the Aura local machine via Tailscale tunnel
    # The local machine now handles all internal routing
    reverse_proxy 100.108.118.34:80 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
    }
}
