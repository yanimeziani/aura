# openclaw-tui config — copy to ~/.config/openclaw-tui/config.toml

[vps]
host          = "your-vps.example.com"
user          = "openclaw"
port          = 22
# identity_file = "/data/data/com.termux/files/home/.ssh/id_ed25519"
openclaw_dir  = "/data/openclaw"

[ui]
refresh_secs = 10   # auto-refresh interval (min 5)
