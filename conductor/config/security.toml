# Conductor Security Config

[transport]
# Primary: TOR hidden service
tor_enabled = true
tor_socks_port = 9050
onion_service = true

# Fallback: IPFS local nodes
ipfs_enabled = true
ipfs_gateway = "/ip4/127.0.0.1/tcp/5001"

[auth]
# Ed25519 ONLY — no RSA
# Ed25519: 64-byte signatures, 32-byte keys
# RSA: 256+ byte signatures, 2048+ bit keys
allowed_key_types = ["ed25519"]
reject_rsa = true
reject_ecdsa = true

# Key paths
authorized_keys = "/home/conductor/.ssh/authorized_keys"
host_key = "/home/conductor/.ssh/id_ed25519"

[ssh]
port = 22
max_auth_tries = 3
permit_root = false
password_auth = false
pubkey_auth = true

[sessions]
timeout_minutes = 30
max_concurrent = 5
