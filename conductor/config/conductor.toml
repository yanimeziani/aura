# Conductor Configuration

[orchestrator]
max_agents = 10
tick_interval_ms = 100
task_timeout_s = 300

[providers.anthropic]
model = "claude-sonnet-4-20250514"
max_tokens = 8192
temperature = 0.7

[providers.openai]
model = "gpt-4o"
max_tokens = 4096
temperature = 0.7

[providers.local]
endpoint = "http://localhost:11434"
model = "llama3.2"

[logging]
level = "info"
format = "json"
output = "stdout"

[security]
sandbox_enabled = true
max_execution_time_s = 60
allowed_paths = ["/tmp", "/home/conductor"]
