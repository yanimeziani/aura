# Model Routing Policy — Cerberus / Pegasus
# BMAD v6: use cheapest model that can do the job.
# Review and update as pricing and model capabilities change.

version: "1.0"

# Tier definitions
tiers:
  cheap:
    model_id: claude-haiku-4-5-20251001
    cost_relative: 1x
    description: "Fast, cheap, good for classification/extraction/formatting"
  mid:
    model_id: claude-sonnet-4-6
    cost_relative: ~5x
    description: "Solid reasoning, code generation, moderate complexity tasks"
  top:
    model_id: claude-sonnet-4-6     # upgrade path: claude-opus-4-6
    cost_relative: ~15x
    description: "Reserved for production incidents, security arch, complex refactors"

# Task → tier routing table
routing:
  # Always cheap
  - task: log_parsing
    tier: cheap
  - task: lint_output_summary
    tier: cheap
  - task: dependency_audit_triage
    tier: cheap
  - task: routine_doc_update
    tier: cheap
  - task: cost_report_formatting
    tier: cheap
  - task: seo_metadata_generation
    tier: cheap
  - task: template_generation
    tier: cheap
  - task: content_pipeline_batch
    tier: cheap
  - task: report_formatting
    tier: cheap
  - task: data_extraction
    tier: cheap
  - task: email_copy_draft
    tier: cheap
  - task: uptime_check_summary
    tier: cheap
  - task: test_writing_simple
    tier: cheap

  # Mid-tier
  - task: bug_investigation
    tier: mid
  - task: pipeline_fix
    tier: mid
  - task: security_scan_triage
    tier: mid
  - task: dockerfile_refactor
    tier: mid
  - task: moderate_infra_change
    tier: mid
  - task: scraper_logic
    tier: mid
  - task: ab_variant_code
    tier: mid
  - task: analytics_instrumentation
    tier: mid
  - task: seo_strategy
    tier: mid
  - task: feature_flag_implementation
    tier: mid
  - task: moderate_debugging
    tier: mid
  - task: funnel_analysis_moderate
    tier: mid

  # Top-tier only
  - task: production_incident
    tier: top
  - task: security_architecture
    tier: top
  - task: complex_infra_redesign
    tier: top
  - task: threat_modeling
    tier: top
  - task: complex_experiment_design
    tier: top
  - task: conversion_architecture
    tier: top
  - task: growth_strategy_deep
    tier: top

# Override rules (applied after routing table)
overrides:
  - condition: "daily_spend > 80% of cap"
    action: "downgrade all mid → cheap, top → mid"
    notify: true
  - condition: "panic_mode == true"
    action: "all tasks → cheap; top-tier blocked except P1 incidents"
    notify: true
  - condition: "agent == growth AND incident_active == true"
    action: "pause growth agent entirely"
    notify: true

# Logging requirement
logging:
  log_model_choice: true
  log_justification: true
  log_cost_estimate: true
