# Nord-themed Starship Prompt

# General
add_newline = false
command_timeout = 1000

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Character (prompt symbol)
[character]
success_symbol = "[❯](bold #A3BE8C)"
error_symbol = "[❯](bold #BF616A)"
vimcmd_symbol = "[❮](bold #88C0D0)"

# Username
[username]
style_user = "bold #88C0D0"
style_root = "bold #BF616A"
format = "[$user]($style)"
show_always = false

# Hostname
[hostname]
style = "bold #81A1C1"
format = "[@$hostname]($style) "
ssh_only = true

# Directory
[directory]
style = "#8FBCBB"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "#BF616A"

[directory.substitutions]
"Documents" = ""
"Downloads" = ""
"Projects" = ""
"~" = "~"

# Git branch
[git_branch]
style = "#B48EAD"
format = "[$symbol$branch]($style) "
symbol = " "

# Git status
[git_status]
style = "#EBCB8B"
format = "[$all_status$ahead_behind]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Command duration
[cmd_duration]
style = "#4C566A"
format = "[$duration]($style) "
min_time = 2000

# Languages (optional, minimal)
[nodejs]
style = "#A3BE8C"
format = "[$symbol($version)]($style) "
symbol = " "
detect_files = ["package.json"]

[python]
style = "#EBCB8B"
format = "[$symbol($version)]($style) "
symbol = " "

[rust]
style = "#D08770"
format = "[$symbol($version)]($style) "
symbol = " "

[golang]
style = "#88C0D0"
format = "[$symbol($version)]($style) "
symbol = " "

# Disabled modules
[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true
